apiVersion: 1

# Настройка источника данных PostgreSQL
datasources:
  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: security_logs
    user: ${DB_USER}
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: 'disable'
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400 # 4 часа

      # Настройки временной зоны
current:
      timezone: utc

      # Включить поддержку временных рядов
      timeInterval: '1m'

      # Опции схемы
      schema: public
      sslmode: disable
      # Подключение через SSL
      # sslmode: require
      # Включить SSL
      # enable_ssl: true