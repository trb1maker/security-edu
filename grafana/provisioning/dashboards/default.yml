apiVersion: 1

# Настройка провизионинга дашбордов
providers:
  - name: 'default'
    orgId: 1
    folder: 'Security'
    type: file
    options:
      path: /var/lib/grafana/dashboards
      # Рекурсивный поиск
      recursive: true
      # Период сканирования (в секундах)
      updateIntervalSeconds: 30