      - "8.8.8.8"
      - "1.1.1.1"
      - "91.121.87.10"
      - "185.220.101.1"
      - "23.129.64.100"

generators:
  auth:
    events_per_day_normal: 50000
    events_per_day_attack: 80000
    output_format: "parquet"
    
  nginx:
    requests_per_day_normal: 500000
    requests_per_day_attack: 800000
    output_format: "parquet"
    
  dns:
    queries_per_day_normal: 200000
