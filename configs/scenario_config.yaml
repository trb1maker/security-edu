# Конфигурация сценария атаки для FinanceFlow
scenario:
  name: "FinanceFlow Incident FIN-2024-001"
  start_date: "2024-01-01"
  duration_days: 81  # 60 baseline + 14 attack + 7 post-incident
  base_seed: 42
  
  attack_params:
    target_user: "dev_sergey"
    attacker_ips: ["203.0.113.42", "198.51.100.77", "45.33.32.156"]
    c2_domain: "data-sync.xyz"
    attack_start_day: 61  # Атака начинается на 61-й день
    
  normal_traffic:
    users: ["admin", "analyst", "operator", "user1", "user2", "user3", "developer", "manager"]
    internal_ips: 
      - "192.168.1.100"
      - "192.168.1.101"
